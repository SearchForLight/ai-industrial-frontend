<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>注册 - 远程工业运维平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="text-center mb-4">用户注册</h2>
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" id="regUsername" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" id="regPassword" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">请选择角色</label>
                                <div class="d-flex flex-wrap gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="role" value="user" checked>
                                        <label class="form-check-label">普通用户</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="role" value="expert">
                                        <label class="form-check-label">远程专家</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="role" value="admin">
                                        <label class="form-check-label">管理员</label>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3" id="adminPasswordDiv" style="display:none;">
                                <label class="form-label">管理员专用密码</label>
                                <input type="password" id="adminPassword" class="form-control" placeholder="请输入1227">
                            </div>
                            <button type="submit" class="btn btn-success w-100">注册并登录</button>
                        </form>
                        <p class="text-center mt-3"><a href="index.html">已有账号？去登录</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.querySelectorAll('input[name="role"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.getElementById('adminPasswordDiv').style.display =
                    this.value === 'admin' ? 'block' : 'none';
            });
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const role = document.querySelector('input[name="role"]:checked').value;
            const adminPass = document.getElementById('adminPassword').value;
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username) {
                alert('用户名不能为空');
                return;
            }

            try {
                await apiRegister(username, password, role, adminPass);
                alert('注册成功！');
                window.location.href = 'main.html';
            } catch (err) {
                alert(err.message || '注册失败');
            }
        });
    </script>
</body>
</html>
